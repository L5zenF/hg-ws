<style>

ute;width:var(--s);height:var(--s);left:var(--x);top:var(--y);border-radius:50%;background:rgba(45,35,25,.32);filter:blur(.35px);opacity:.08;animation:float var(--d) ease-in-out infinite alternate}@keyframes float{from{transform:translate3d(0,0,0) scale(.82)}to{transform:translate3d(var(--dx),var(--dy),0) scale(1.12)}}main{position:relative;z-index:1;width:min(1180px,calc(var(--vw) - var(--pad)*2));height:var(--vh);margin:0 auto;padding:var(--pad) 0;display:grid;place-items:center}.paper{position:relative;width:100%;height:100%;padding:var(--py) var(--px);border-radius:18px;border:1px solid var(--edge);background:linear-gradient(90deg,rgba(109,76,37,.052) 0 1px,transparent 1px 44px),linear-gradient(180deg,rgba(255,255,255,.48),transparent 22%),radial-gradient(circle at 20% 18%,rgba(255,252,232,.92),transparent 26rem),radial-gradient(circle at 82% 86%,rgba(168,120,52,.12),transparent 28rem),var(--paper);box-shadow:0 36px 94px rgba(42,30,17,.39),inset 0 0 0 9px rgba(255,249,226,.2),inset 0 0 72px rgba(95,66,31,.13);overflow:hidden;isolation:isolate;animation:breath 8s ease-in-out infinite alternate}@keyframes breath{to{box-shadow:0 42px 112px rgba(42,30,17,.43),inset 0 0 0 9px rgba(255,249,226,.24),inset 0 0 88px rgba(95,66,31,.16)}}.paper:before{content:"";position:absolute;inset:18px;border:1px solid var(--soft);border-radius:inherit;pointer-events:none}.paper:after{content:"";position:absolute;inset:30px;border:1px solid rgba(139,48,38,.105);border-radius:10px;pointer-events:none}.wash,.cols,.corners,.shade,.dust{pointer-events:none;position:absolute}.wash{inset:auto -7% -10% -7%;z-index:0;height:34%;opacity:.145;filter:blur(.2px);background:radial-gradient(ellipse at 14% 84%,#251e18 0 10%,transparent 37%),radial-gradient(ellipse at 42% 92%,#251e18 0 12%,transparent 42%),radial-gradient(ellipse at 72% 86%,#251e18 0 11%,transparent 38%),linear-gradient(to top,#251e18,transparent 64%);mix-blend-mode:multiply;animation:wash 16s ease-in-out infinite alternate}@keyframes wash{to{transform:translateX(1.8%) scaleX(1.04);opacity:.17}}.cols{z-index:1;inset:var(--py) var(--px);opacity:var(--grid);background:linear-gradient(to left,rgba(139,48,38,.32) 0 1px,transparent 1px var(--col)),linear-gradient(to bottom,rgba(95,65,30,.105) 0 1px,transparent 1px calc(var(--fz)*var(--lh)));background-size:var(--col) 100%,100% calc(var(--fz)*var(--lh));mask-image:linear-gradient(to right,transparent,#000 10%,#000 90%,transparent);transition:background-size .24s ease,opacity .24s ease}.corners{inset:30px;z-index:4;opacity:.68;background:linear-gradient(var(--red),var(--red)) left top/34px 2px no-repeat,linear-gradient(var(--red),var(--red)) left top/2px 34px no-repeat,linear-gradient(var(--red),var(--red)) right top/34px 2px no-repeat,linear-gradient(var(--red),var(--red)) right top/2px 34px no-repeat,linear-gradient(var(--red),var(--red)) left bottom/34px 2px no-repeat,linear-gradient(var(--red),var(--red)) left bottom/2px 34px no-repeat,linear-gradient(var(--red),var(--red)) right bottom/34px 2px no-repeat,linear-gradient(var(--red),var(--red)) right bottom/2px 34px no-repeat;mix-blend-mode:multiply}.shade{z-index:5;inset:0;background:linear-gradient(to right,rgba(59,40,21,var(--left,.18)),transparent 12%,transparent 88%,rgba(59,40,21,var(--right,.18))),linear-gradient(to bottom,rgba(255,250,230,.16),transparent 16%,transparent 82%,rgba(58,38,20,.13));mix-blend-mode:multiply}.dust{z-index:3;inset:var(--py) var(--px);opacity:.22;background:radial-gradient(circle at 12% 20%,rgba(183,139,74,.5) 0 1px,transparent 2px),radial-gradient(circle at 46% 72%,rgba(183,139,74,.38) 0 1px,transparent 2px),radial-gradient(circle at 76% 34%,rgba(183,139,74,.36) 0 1px,transparent 2px),radial-gradient(circle at 88% 78%,rgba(183,139,74,.42) 0 1px,transparent 2px);background-size:190px 170px,230px 210px,260px 190px,310px 240px;animation:dust 14s ease-in-out infinite alternate;mix-blend-mode:multiply}@keyframes dust{to{transform:translate3d(-18px,11px,0);opacity:.28}}pre.sutra{position:relative;z-index:2;width:100%;height:100%;margin:0;padding:0;writing-mode:vertical-rl;text-orientation:mixed;white-space:pre-wrap;overflow:auto hidden;color:var(--ink);font-family:inherit;font-size:var(--fz);line-height:var(--lh);letter-spacing:var(--ls);font-weight:400;text-rendering:optimizeLegibility;-webkit-font-smoothing:antialiased;scrollbar-width:thin;scrollbar-color:rgba(92,63,32,.28) transparent;transition:font-size .2s ease,letter-spacing .2s ease,line-height .2s ease,opacity .18s ease,filter .18s ease;text-shadow:0 .25px 0 rgba(255,250,230,.45)}pre.sutra::first-line{color:var(--red);font-weight:500}pre.sutra.fitting{opacity:.72;filter:blur(.35px)}pre.sutra.ready{animation:reveal .55s ease both}@keyframes reveal{from{opacity:.36;filter:blur(1px);transform:translateX(5px)}to{opacity:1;filter:blur(0);transform:translateX(0)}}pre.sutra::-webkit-scrollbar{height:8px;width:8px}pre.sutra::-webkit-scrollbar-thumb{border-radius:999px;background:rgba(92,63,32,.28)}pre.sutra::-webkit-scrollbar-track{background:transparent}@media(max-width:720px){:root{--pad:10px;--px:22px;--py:34px;--grid:.13}.paper{border-radius:14px}.paper:before{inset:12px}.paper:after{inset:22px}.corners{inset:22px;background-size:24px 2px,2px 24px,24px 2px,2px 24px,24px 2px,2px 24px,24px 2px,2px 24px}.dust{opacity:.16}}@media(prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}

<body>
<div class="ambient" aria-hidden="true"><i class="mist one"></i><i class="mist two"></i><i class="mist three"></i></div>
<main><article class="paper" id="paper"><i class="wash"></i><i class="cols"></i><i class="dust"></i><i class="corners"></i><i class="shade" id="shade"></i><pre id="sutra" class="sutra"></pre></article></main>
<script type="module">
const TEXT=`太上老君说常清静经

老君曰：大道无形，生育天地；大道无情，运行日月；大道无名，长养万物。吾不知其名，强名曰道。

夫道者，有清有浊，有动有静。天清地浊，天动地静；男清女浊，男动女静。降本流末，而生万物。

清者浊之源，动者静之基。人能常清静，天地悉皆归。

夫人神好清，而心扰之；人心好静，而欲牵之。常能遣其欲，而心自静；澄其心，而神自清。自然六欲不生，三毒消灭。

所以不能者，为心未澄，欲未遣也。能遣之者，内观其心，心无其心；外观其形，形无其形；远观其物，物无其物。三者既悟，唯见于空。

观空亦空，空无所空。所空既无，无无亦无。无无既无，湛然常寂。寂无所寂，欲岂能生？欲既不生，即是真静。

真常应物，真常得性；常应常静，常清静矣。

如此清静，渐入真道。既入真道，名为得道。虽名得道，实无所得。为化众生，名为得道。能悟之者，可传圣道。

老君曰：上士无争，下士好争；上德不德，下德执德。执著之者，不名道德。

众生所以不得真道者，为有妄心。既有妄心，即惊其神；既惊其神，即著万物；既著万物，即生贪求；既生贪求，即是烦恼。

烦恼妄想，忧苦身心，便遭浊辱，流浪生死，常沉苦海，永失真道。

真常之道，悟者自得。得悟道者，常清静矣。

仙人葛翁曰：吾得真道，曾诵此经万遍。此经是天人所习，不传下士。吾昔受之于东华帝君，东华帝君受之于金阙帝君，金阙帝君受之于西王母。西王母皆口口相传，不记文字。吾今于世，书而录之。

上士悟之，升为天官；中士修之，南宫列仙；下士得之，在世长年。游行三界，升入金门。

左玄真人曰：学道之士，持诵此经者，即得十天善神拥护其身。然后玉符保神，金液炼形。形神俱妙，与道合真。

正一真人曰：人家有此经，悟解之者，灾障不干，众圣护门。神升上界，朝拜高真。功满德就，相感帝君。诵持不退，身腾紫云。`;
const root=document.documentElement,ambient=document.querySelector('.ambient'),paper=document.getElementById('paper'),sutra=document.getElementById('sutra'),shade=document.getElementById('shade');
sutra.textContent=TEXT;
const state={mod:null,cache:new Map(),raf:0,timer:0,dpr:devicePixelRatio};
for(let i=0,n=innerWidth<720?18:34;i<n;i++){const d=document.createElement('i');d.className='dot';d.style.cssText=`--s:${1+Math.random()*3.6}px;--x:${Math.random()*100}%;--y:${Math.random()*100}%;--dx:${-18+Math.random()*36}px;--dy:${-18+Math.random()*36}px;--d:${5+Math.random()*12}s`;ambient.appendChild(d)}
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function vp(){const v=visualViewport,w=v?.width||innerWidth,h=v?.height||innerHeight;root.style.setProperty('--vw',w+'px');root.style.setProperty('--vh',h+'px');return{w,h}}
function box(){const r=paper.getBoundingClientRect(),s=getComputedStyle(paper),px=parseFloat(s.paddingLeft)+parseFloat(s.paddingRight),py=parseFloat(s.paddingTop)+parseFloat(s.paddingBottom);return{line:Math.max(160,r.height-py),block:Math.max(160,r.width-px)}}
function font(size){return `${size}px "Songti SC","STSong","Noto Serif CJK SC","Source Han Serif SC","SimSun",serif`}
async function lib(){state.mod ||= import('https://esm.sh/@chenglou/pretext');return state.mod}
function prepared(prepare,size){const k=String(size);if(!state.cache.has(k))state.cache.set(k,prepare(TEXT,font(size)));return state.cache.get(k)}
async function fit(){sutra.classList.add('fitting');sutra.classList.remove('ready');const v=vp(),b=box(),mobile=v.w<720,ratio=mobile?1.9:2.04,min=mobile?16:19,max=clamp(Math.floor(Math.min(b.line,b.block)/(mobile?16:21)),mobile?22:31,mobile?25:34);let chosen=min,advance=min*ratio,lines=1;try{if(document.fonts?.ready)await document.fonts.ready;const{prepare,layout}=await lib();for(let size=max;size>=min;size-=.5){const a=size*ratio,res=layout(prepared(prepare,size),b.line,a),need=res.lineCount*a;if(need<=b.block*.982){chosen=size;advance=a;lines=res.lineCount;break}if(!lines||need<lines*advance){chosen=size;advance=a;lines=res.lineCount}}}catch{chosen=clamp(Math.floor(Math.min(b.line,b.block)/(mobile?22:31)),min,max);advance=chosen*ratio;lines=Math.floor(b.block/advance)}root.style.setProperty('--fz',chosen+'px');root.style.setProperty('--lh',String(ratio));root.style.setProperty('--ls',Math.max(.7,chosen*.065)+'px');root.style.setProperty('--col',advance+'px');root.style.setProperty('--grid',String(clamp(.09+Math.min(1,lines*advance/b.block)*.16,.1,.25)));clearTimeout(state.timer);state.timer=setTimeout(()=>{sutra.classList.remove('fitting');sutra.classList.add('ready')},80);shadow()}
function shadow(){const max=Math.max(1,sutra.scrollWidth-sutra.clientWidth),p=sutra.scrollLeft/max;shade.style.setProperty('--left',String(clamp(.06+p*.2,.06,.26)));shade.style.setProperty('--right',String(clamp(.26-p*.2,.06,.26)))}
function schedule(){cancelAnimationFrame(state.raf);state.raf=requestAnimationFrame(fit)}
new ResizeObserver(schedule).observe(paper);sutra.addEventListener('scroll',shadow,{passive:true});addEventListener('resize',schedule,{passive:true});addEventListener('orientationchange',()=>setTimeout(schedule,160),{passive:true});visualViewport?.addEventListener('resize',schedule,{passive:true});visualViewport?.addEventListener('scroll',schedule,{passive:true});document.fonts?.addEventListener?.('loadingdone',()=>{state.cache.clear();schedule()});setInterval(()=>{if(devicePixelRatio!==state.dpr){state.dpr=devicePixelRatio;schedule()}},400);schedule();
</script>
